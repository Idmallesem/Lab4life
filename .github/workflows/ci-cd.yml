name: CI-CD

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Verify Java
        run: |
          java -version
          mvn -v

      - name: Run tests
        run: mvn -B test
        working-directory: backend

      - name: Build jar
        run: mvn -B -DskipTests package
        working-directory: backend

      - name: Ensure deploy dir exists
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -eux
            mkdir -p /opt/app/Lab4life
            ls -ld /opt/app/Lab4life

      - name: Upload jar to server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend/target/*.jar"
          target: "/opt/app/Lab4life"
          overwrite: true
          debug: true

      - name: Activate jar and restart service
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -eux
            cd /opt/app/Lab4life
            ls -la
            latest="$(ls -t *.jar | head -n 1)"
            test -n "$latest"
            mv -f "$latest" app.jar
            sudo systemctl restart app
            sudo systemctl status app --no-pager
